<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KEY"></script>
    <style>
      html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      let map;
      let markers = [];

      // 지도 초기화 및 중심 좌표 설정
      function initMap(lat, lng) {
        const center = new kakao.maps.LatLng(lat, lng);
        const options = { center, level: 5 };
        map = new kakao.maps.Map(document.getElementById('map'), options);
        console.log("initMap called with:", lat, lng);
      }

      // 지정 위치에 마커 추가
      function addMarker(lat, lng, title) {
        const position = new kakao.maps.LatLng(lat, lng);
        const marker = new kakao.maps.Marker({ position, title });
        marker.setMap(map);
        markers.push(marker);
      }

      // 현재 지도에 표시된 모든 마커 제거
      function clearMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
      }

      // 지도 중심 좌표를 지정한 위치로 이동
      function moveTo(lat, lng) {
        const center = new kakao.maps.LatLng(lat, lng);
        map.setCenter(center);
      }

      // 지도 중심 좌표를 지정한 위치로 이동
      function moveToLocation(lat, lng) {
        const loc = new kakao.maps.LatLng(lat, lng);
        map.setCenter(loc);
      }

      // 마커 추가 + 지도 중심 이동 (하이라이트)
      function focusOn(lat, lng, name) {
        addMarker(lat, lng, name);
        moveTo(lat, lng);
      }
    </script>
  </body>
</html>
